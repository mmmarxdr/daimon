agent:
  name: "Micro"
  personality: |
    You are a concise, helpful personal assistant.
    You respond in Spanish unless spoken to in another language.
    You prefer short, actionable answers over lengthy explanations.
  max_iterations: 10
  max_tokens_per_turn: 4096
  history_length: 20
  memory_results: 5

provider:
  type: anthropic
  model: claude-3-5-sonnet-20241022
  api_key: ${ANTHROPIC_API_KEY}
  timeout: 60s
  max_retries: 3

channel:
  type: cli

tools:
  shell:
    enabled: true
    allowed_commands:
      - ls
      - cat
      - grep
      - find
      - wc
      - head
      - tail
      - echo
      - date
      - pwd
    allow_all: false
    working_dir: "~"
  file:
    enabled: true
    base_path: "~/workspace"
    max_file_size: "1MB"
  http:
    enabled: true
    timeout: 15s
    max_response_size: "512KB"
    blocked_domains: []

store:
  type: file
  path: "~/.microagent/data"

logging:
  level: info
  format: text
  file: ""

limits:
  tool_timeout: 30s
  total_timeout: 120s
